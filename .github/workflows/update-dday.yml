name: Update D-day image

on:
  schedule:
    - cron: "9 14 * * *"
    - cron: "39 14 * * *"
    - cron: "9 15 * * *"
    - cron: "39 15 * * *"
    - cron: "9 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dday:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pillow and fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          pip install pillow

      - name: Generate D-day images
        run: python make_dday.py

      - name: Commit updated images
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add *.png
          git commit -m "Update dday images" || echo "No changes to commit"
          git push
